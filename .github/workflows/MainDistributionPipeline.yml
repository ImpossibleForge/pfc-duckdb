#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.2
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5.2
      extension_name: pfc
      # Windows test runner has a Git Bash path-munging issue with the DuckDB test framework.
      # The extension itself builds and works correctly on Windows. Skip Windows from test run.
      exclude_archs: "windows_amd64;windows_amd64_mingw"

  duckdb-windows-build:
    name: Build Windows binaries (no tests — Git Bash path issue in CI)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.2
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5.2
      extension_name: pfc
      opt_in_archs: "windows_amd64"
      skip_tests: true

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.2
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5.2
      extension_name: pfc
      format_checks: 'format;tidy'
